<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nishant Mobile Accessories</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:black; color:white; padding:15px; text-align:center;}
nav {background:#222; padding:10px; text-align:center;}
nav a {color:white; margin:10px; text-decoration:none;}
.banner {background:url('https://via.placeholder.com/1200x300'); height:200px; background-size:cover; display:flex; align-items:center; justify-content:center; color:white; font-size:24px;}
.products {display:flex; flex-wrap:wrap; justify-content:center;}
.product {background:white; margin:10px; padding:15px; width:180px; border-radius:10px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
.product img {width:100%; border-radius:10px;}
button {background:green; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer; width:100%; margin-top:5px;}
button:hover {background:darkgreen;}
.cart {position:fixed; top:10px; right:10px; background:white; padding:10px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);} 
footer {background:black; color:white; text-align:center; padding:10px; margin-top:20px;}
.form-box {background:white; margin:20px; padding:15px; border-radius:10px; max-width:300px; margin-left:auto; margin-right:auto; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
input {width:100%; padding:8px; margin:5px 0;}
</style>

<script>
let cart = [];

function addToCart(product, price){
    cart.push({product, price});
    alert(product + " added to cart");
}

function payNow(product, price){
    var upi = "7535021462@upi";
    var name = "Nishant Mobile Accessories";
    var upiLink = "upi://pay?pa=" + upi + "&pn=" + name + "&am=" + price + "&cu=INR";
    window.location.href = upiLink;
}

function checkout(){
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;

    if(name=="" || address==""){
        alert("Please fill name & address");
        return;
    }

    let number = "917535021462";
    let message = "Order Details:%0A";
    let total = 0;

    cart.forEach(item => {
        message += item.product + " - ₹" + item.price + "%0A";
        total += item.price;
    });

    message += "%0AName: " + name;
    message += "%0AAddress: " + address;
    message += "%0ATotal: ₹" + total;

    let whatsapp = "https://wa.me/" + number + "?text=" + message;
    window.open(whatsapp, '_blank');

    let upi = "7535021462@upi";
    let upiLink = "upi://pay?pa=" + upi + "&pn=Nishant Mobile Accessories&am=" + total + "&cu=INR";

    setTimeout(() => {
        window.location.href = upiLink;
    }, 2000);
}
</script>

</head>

<body>

<header>
<h2>Nishant Mobile Accessories</h2>
<p>Best Deals on Mobile Accessories</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="banner">Best Accessories at Best Price</div>

<div class="cart">
<button onclick="checkout()">Checkout 🛒</button>
</div>

<div class="form-box">
<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="address" placeholder="Enter Address">
</div>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Mobile Cover</h4>
<p>₹199</p>
<button onclick="addToCart('Mobile Cover',199)">Add to Cart</button>
<button onclick="payNow('Mobile Cover',199)">Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Fast Charger</h4>
<p>₹499</p>
<button onclick="addToCart('Fast Charger',499)">Add to Cart</button>
<button onclick="payNow('Fast Charger',499)">Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Bluetooth Earbuds</h4>
<p>₹999</p>
<button onclick="addToCart('Earbuds',999)">Add to Cart</button>
<button onclick="payNow('Earbuds',999)">Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>USB Cable</h4>
<p>₹149</p>
<button onclick="addToCart('USB Cable',149)">Add to Cart</button>
<button onclick="payNow('USB Cable',149)">Buy Now</button>
</div>

</div>

<footer>
<p>Contact: 7535021462 | WhatsApp Order Available</p>
</footer>

</body>
</html>
